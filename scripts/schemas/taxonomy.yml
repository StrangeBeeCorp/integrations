# Centralized Taxonomy
# Defines standard categories and tags for vendor classification

# Valid vendor categories
categories:
  - name: Attack Surface Intelligence
    description: Internet-wide scanning, asset discovery, and exposure monitoring
    examples: [Shodan, Onyphe, Censys]

  - name: Breach Intelligence
    description: Credential breach tracking and leaked data monitoring
    examples: [Have I Been Pwned]

  - name: Cloud Infrastructure
    description: Cloud platforms and services used as automation or hosting infrastructure
    examples: [AWS Lambda, OVHcloud]

  - name: Collaboration
    description: Messaging and team collaboration platforms
    examples: [Slack, Microsoft Teams, Mattermost]

  - name: DFIR
    description: Digital Forensics and Incident Response tools
    examples: [GRR Rapid Response, Velociraptor]

  - name: EDR
    description: Endpoint Detection and Response platforms
    examples: [CrowdStrike Falcon, SentinelOne, HarfangLab]

  - name: Email Security
    description: Email security gateways and anti-phishing solutions
    examples: [Proofpoint, Gmail]

  - name: Identity & Access Management
    description: IAM, SSO, MFA, and identity management solutions
    examples: [Okta, Microsoft Entra ID, Duo Security]

  - name: Malware Analysis
    description: Malware sandboxing, detonation, and analysis platforms
    examples: [Cuckoo Sandbox, VMRay, ClamAV]

  - name: Network Security
    description: Firewalls, IDS/IPS, and network monitoring
    examples: [Palo Alto, Check Point, Zscaler]

  - name: OSINT & Enrichment
    description: Open-source intelligence and observable enrichment services
    examples: [MaxMind, IPinfo, SecurityTrails]

  - name: Phishing Intelligence
    description: Phishing detection, tracking, and intelligence
    examples: [PhishTank]

  - name: SIEM & Analytics
    description: Security Information and Event Management and log analytics
    examples: [Splunk, Elasticsearch, Wazuh]

  - name: SOAR & Automation
    description: Security Orchestration, Automation and Response platforms
    examples: [Cortex XSOAR, Shuffle, n8n]

  - name: Threat Intelligence
    description: Threat feeds, IOC databases, and intelligence platforms
    examples: [VirusTotal, MISP, OpenCTI, AlienVault OTX]

  - name: URL Analysis
    description: URL scanning and web content analysis
    examples: [URLScan.io, URLhaus]

  - name: Vulnerability Management
    description: Vulnerability scanning and management platforms
    examples: [Nessus, Tenable, Qualys]

  - name: Web Application Firewall
    description: Web application firewalls and web traffic filtering
    examples: [Cloudflare]

# Standard tags for vendor classification
tags:
  # Use Case Tags
  - name: alerts
    category: use-case
    description: Alert generation and management

  - name: enrichment
    category: use-case
    description: Data enrichment and context gathering

  - name: threat-hunting
    category: use-case
    description: Proactive threat hunting activities

  - name: incident-response
    category: use-case
    description: Incident response and handling

  - name: automation
    category: use-case
    description: Security automation and orchestration

  - name: investigation
    category: use-case
    description: Security investigation and analysis

  - name: remediation
    category: use-case
    description: Automated remediation actions

  # Technology Tags
  - name: api
    category: technology
    description: RESTful API integrations

  - name: webhook
    category: technology
    description: Webhook-based integrations

  - name: syslog
    category: technology
    description: Syslog-based integrations

  # Data Type Tags
  - name: ioc
    category: data-type
    description: Indicators of Compromise

  - name: malware
    category: data-type
    description: Malware analysis and detection

  - name: phishing
    category: data-type
    description: Phishing detection and response

  - name: vulnerabilities
    category: data-type
    description: Vulnerability information

  - name: logs
    category: data-type
    description: Log collection and analysis

  - name: network-traffic
    category: data-type
    description: Network traffic analysis

  - name: file-analysis
    category: data-type
    description: File analysis and sandboxing

  # Feature Tags
  - name: real-time
    category: feature
    description: Real-time monitoring and alerts

  - name: historical
    category: feature
    description: Historical data and analysis

  - name: reputation
    category: feature
    description: Reputation scoring and lookup

  - name: sandbox
    category: feature
    description: Sandbox analysis capabilities

  - name: threat-intel
    category: feature
    description: Threat intelligence feeds

  # Communication Tags
  - name: messaging
    category: communication
    description: Instant messaging platforms

  - name: notifications
    category: communication
    description: Notification delivery

  - name: collaboration
    category: communication
    description: Team collaboration features

  - name: ticketing
    category: communication
    description: Ticket creation and management

  # Platform Tags
  - name: cloud
    category: platform
    description: Cloud-based platform

  - name: on-premise
    category: platform
    description: On-premise deployment

  - name: saas
    category: platform
    description: Software as a Service

  # Pricing Tags
  - name: free-tier
    category: pricing
    description: Free tier available

  - name: open-source
    category: pricing
    description: Open source solution

  - name: commercial
    category: pricing
    description: Commercial/paid solution

